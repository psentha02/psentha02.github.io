  <!-- ─── PravGPT Chat Logic ─────────────────────────────────── -->
  <script type="text/babel" data-presets="react">
  const PRAVGPT_SYSTEM_PROMPT = `You are PravGPT, an AI assistant embedded on Praveen Sentha's personal portfolio website. Your job is to answer visitors' questions about Praveen, his work, his projects, and his background.

Tone: casual but polite, informative, concise. Speak in first person ABOUT Praveen (i.e. "Praveen built…" or "He works at Qualcomm…"), never as Praveen. Use plain prose — no markdown headings, no bullet lists unless the visitor explicitly asks for a list. Keep replies under 4 short sentences unless asked for detail.

If asked something not covered by the data below, say you don't have that info and suggest reaching out via the contact card. Don't make things up.

=== DATA ABOUT PRAVEEN ===
${JSON.stringify(window.PORTFOLIO_DATA, null, 2)}
`;

  window.usePravGPT = function usePravGPT() {
    const [messages, setMessages] = React.useState([]);
    const [sending, setSending] = React.useState(false);
    const nextId = React.useRef(0);

    const send = React.useCallback(async (userText) => {
      if (!userText || sending) return;
      const trimmed = userText.trim();
      if (!trimmed) return;

      const uid = nextId.current++;
      const userMsg = { id: `u${uid}`, role: 'user', content: trimmed };
      const placeholder = { id: `a${uid}`, role: 'assistant', content: '', pending: true };
      setMessages((m) => [...m, userMsg, placeholder]);
      setSending(true);

      try {
        const history = [...messages, userMsg].map((m) => ({
          role: m.role,
          content: m.content,
        }));
        const reply = await window.claude.complete({
          messages: [
            { role: 'user', content: PRAVGPT_SYSTEM_PROMPT },
            { role: 'assistant', content: "Got it — I'll answer questions about Praveen using only that info, in a casual but polite tone, in first person about him." },
            ...history,
          ],
        });
        // Preserve the stable id — same DOM node, no re-animation
        setMessages((m) => {
          const copy = [...m];
          const last = copy[copy.length - 1];
          copy[copy.length - 1] = { ...last, content: reply || "Hmm, I didn't get a response. Try again?", pending: false };
          return copy;
        });
      } catch (err) {
        setMessages((m) => {
          const copy = [...m];
          const last = copy[copy.length - 1];
          copy[copy.length - 1] = {
            ...last,
            content: "Sorry — I hit a snag reaching the model. Try again in a sec, or shoot Praveen an email at praveen.sentha@gmail.com.",
            pending: false,
          };
          return copy;
        });
      } finally {
        setSending(false);
      }
    }, [messages, sending]);

    const reset = React.useCallback(() => setMessages([]), []);

    return { messages, sending, send, reset };
  };
  </script>

  <!-- ─── Variation A — Constellation ──────────────────────────── -->
  <script type="text/babel" data-presets="react">
  const VarA = ({ data, tweaks }) => {
    const { messages, sending, send, reset } = window.usePravGPT();
    const [input, setInput] = React.useState('');
    const [chatMode, setChatMode] = React.useState(false);

    const TITLES = ['AI Engineer', 'Infrastructure Architect', 'Problem Solver'];
    const [titleIdx, setTitleIdx] = React.useState(0);
    const [titleVisible, setTitleVisible] = React.useState(true);
    React.useEffect(() => {
      const id = setInterval(() => {
        setTitleVisible(false);
        setTimeout(() => { setTitleIdx(i => (i + 1) % TITLES.length); setTitleVisible(true); }, 700);
      }, 3200);
      return () => clearInterval(id);
    }, []);
    const [page, _setPage] = React.useState(() => {
      const h = (typeof window !== 'undefined' && window.location.hash || '').replace('#/', '').replace('#', '');
      return ['about','work','projects','contact'].includes(h) ? h : 'home';
    });
    const setPage = React.useCallback((p) => {
      _setPage(p);
      try {
        const hash = p === 'home' ? '' : `#/${p}`;
        window.history.pushState({ page: p }, '', window.location.pathname + window.location.search + hash);
      } catch (e) {}
      if (typeof window !== 'undefined') window.scrollTo(0, 0);
    }, []);
    React.useEffect(() => {
      const onPop = () => {
        const h = (window.location.hash || '').replace('#/', '').replace('#', '');
        _setPage(['about','work','projects','contact'].includes(h) ? h : 'home');
      };
      window.addEventListener('popstate', onPop);
      return () => window.removeEventListener('popstate', onPop);
    }, []);
    const [theme, setTheme] = React.useState('dark');
    const scrollRef = React.useRef(null);
    const detailScrollRef = React.useRef(null);

    React.useEffect(() => {
      if (!scrollRef.current) return;
      // Scroll after the DOM paints so animation doesn't fight the scroll position
      requestAnimationFrame(() => {
        if (scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
      });
    }, [messages]);

    React.useEffect(() => {
      if (detailScrollRef.current) detailScrollRef.current.scrollTop = 0;
    }, [page]);

    const exitChat = () => { setChatMode(false); reset(); };

    const onSubmit = (e) => {
      e.preventDefault();
      if (!input.trim() || sending) return;
      setChatMode(true);
      send(input);
      setInput('');
    };

    const palettes = {
      dark: {
        warm: { bg: '#0e0d0c', surface: '#1a1816', border: '#2a2622', accent: '#f4d8a8', muted: '#8a8278', fg: '#f6f3ee', soft: '#e8e4dd', softer: '#d4cfc6' },
        cool: { bg: '#050810', surface: '#0c1428', border: '#1a2a50', accent: '#90c4ff', muted: '#8aa4c8', fg: '#ffffff', soft: '#ffffff', softer: '#ccdcf8' },
        plum: { bg: '#10090f', surface: '#1d1320', border: '#2c1f30', accent: '#e8b8d8', muted: '#8a7a85', fg: '#f6f3ee', soft: '#e8d8e0', softer: '#d4c0cc' },
      },
      light: {
        warm: { bg: '#f5efe4', surface: '#fffaf0', border: '#e0d6c4', accent: '#b8843a', muted: '#7a6e5a', fg: '#1a1612', soft: '#2a2418', softer: '#3a3328' },
        cool: { bg: '#eef1f6', surface: '#fbfcff', border: '#d6dde8', accent: '#3a6cb8', muted: '#5a6878', fg: '#0f1420', soft: '#1f2530', softer: '#2f3540' },
        plum: { bg: '#f4eef2', surface: '#fff8fc', border: '#e4d6dc', accent: '#a83a7a', muted: '#7a5a6e', fg: '#1c1118', soft: '#2c1f28', softer: '#3c2f38' },
      },
    };
    const palette = { ...palettes[theme][tweaks.palette || 'warm'], theme };

    const fonts = {
      classic: { display: '"Playfair Display", Georgia, serif', body: 'Inter, system-ui, sans-serif' },
      modern: { display: '"Fraunces", Georgia, serif', body: '"DM Sans", system-ui, sans-serif' },
      techy: { display: '"Newsreader", Georgia, serif', body: '"JetBrains Mono", monospace' },
    }[tweaks.fonts || 'classic'];

    const showStars = tweaks.bg !== 'none' && tweaks.bg !== 'grid' && tweaks.bg !== 'noise';
    const showGrid = tweaks.bg === 'grid';
    const showNoise = tweaks.bg === 'noise';

    const cardStyleBase = {
      glass: { background: `${palette.surface}bb`, backdropFilter: 'blur(12px)', border: `1px solid rgba(255,255,255,0.07)` },
      flat: { background: palette.surface, border: 'none' },
      bordered: { background: palette.surface, border: `1px solid rgba(255,255,255,0.07)` },
    }[tweaks.cardStyle || 'bordered'];

    const density = tweaks.density === 'tight' ? 0.8 : tweaks.density === 'loose' ? 1.25 : 1;

    return (
      <div data-screen-label="Variation A — Constellation" style={{
        width: '100%', minHeight: '100vh', background: palette.bg, color: palette.fg,
        fontFamily: fonts.body, position: 'relative', overflow: 'hidden',

        transition: 'background-color 600ms ease, color 600ms ease',
      }}>
        {/* Background */}
        {showStars && <StarField accent={palette.accent} />}
        {showGrid && <div style={{
          position: 'absolute', inset: 0,
          backgroundImage: `linear-gradient(${palette.border} 1px, transparent 1px), linear-gradient(90deg, ${palette.border} 1px, transparent 1px)`,

        }} />}

        {/* Pendant orb — dangles on mouse, click to toggle theme */}
        <PendantOrb
          accent={palette.accent}
          muted={palette.muted}
          theme={theme}
          onToggle={() => setTheme(t => t === 'dark' ? 'light' : 'dark')}
        />

        {/* Header — fixed, always visible across all pages */}
        <header
          onClick={chatMode ? exitChat : page !== 'home' ? () => setPage('home') : undefined}
          style={{
            textAlign: 'center',
            position: 'fixed', top: 0, left: 0, right: 0,
            zIndex: 100,
            padding: '20px 0 16px',
            background: `linear-gradient(to bottom, ${palette.bg} 65%, transparent)`,
            cursor: (chatMode || page !== 'home') ? 'pointer' : 'default',
          }}
        >
          <h1 style={{
            fontFamily: fonts.display,

          }}>{data.name}</h1>

            fontSize: 13, marginTop: 8, letterSpacing: '0.18em', textTransform: 'uppercase',
            color: palette.accent,
            opacity: titleVisible ? 1 : 0,
            transition: 'opacity 700ms ease',
          }}>
            {TITLES[titleIdx]}
          </p>
        </header>

        {/* Card grid — hidden in chatMode */}
        {!chatMode && (
          <main style={{
            maxWidth: 1280, margin: '0 auto', padding: '0 32px', position: 'relative', zIndex: 2,
            display: page === 'home' ? 'grid' : 'none', gridTemplateColumns: '1.1fr 1.6fr 1.3fr', gap: 20 * density,
            animation: 'fadeIn 300ms ease',
          }}>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 20 * density }}>
              <Card style={{ ...cardStyleBase, minHeight: 200 }} accent={palette.accent} muted={palette.muted}
                onClick={() => setPage('about')} active={page === 'about'}>
                <CardIcon><PersonIcon /></CardIcon>
                <CardTitle font={fonts.display}>About</CardTitle>
                <CardSub muted={palette.muted}>A bit about myself.</CardSub>
                <img
                  src="./Sentha_Family_2.jpg"
                  alt="Praveen Sentha"
                  style={{
                    position: 'absolute', right: 0, top: 0, bottom: 0,
                    width: '52%', height: '100%',
                    objectFit: 'cover', objectPosition: 'center 20%',
                    maskImage: 'linear-gradient(to right, transparent 0%, black 38%)',
                    WebkitMaskImage: 'linear-gradient(to right, transparent 0%, black 38%)',
                    pointerEvents: 'none',
                  }}
                />
              </Card>
              <Card style={cardStyleBase} accent={palette.accent} muted={palette.muted}
                onClick={() => setPage('work')} active={page === 'work'}>
                <CardIcon><BriefcaseIcon /></CardIcon>
                <CardTitle font={fonts.display}>Work</CardTitle>
                <CardSub muted={palette.muted}>{data.experience.length} roles · Qualcomm, Stryker</CardSub>
                <WorkPreview exp={data.experience} accent={palette.accent} muted={palette.muted} />
              </Card>
            </div>
            <Card style={{ ...cardStyleBase, minHeight: 320 }} accent={palette.accent} muted={palette.muted}
              onClick={() => setPage('projects')} active={page === 'projects'} large>
              <ProjectMarquee projects={data.projects} accent={palette.accent} muted={palette.muted} surface={palette.surface} border={palette.border} />
              <div style={{ position: 'absolute', bottom: 24, left: 24, right: 24 }}>
                <CardIcon><FolderIcon /></CardIcon>
                <CardTitle font={fonts.display}>Projects</CardTitle>
                <CardSub muted={palette.muted}>{data.projects.length} things I've shipped recently.</CardSub>
              </div>
            </Card>
            <Card style={{ ...cardStyleBase, minHeight: 320 }} accent={palette.accent} muted={palette.muted}
              onClick={() => setPage('contact')} active={page === 'contact'}>
              <ContactDoodle />
              <div style={{ position: 'absolute', bottom: 24, left: 24, right: 24 }}>
                <CardIcon><SendIcon /></CardIcon>
                <CardTitle font={fonts.display}>Contact</CardTitle>
                <CardSub muted={palette.muted}>Email, LinkedIn, GitHub.</CardSub>
              </div>
            </Card>
          </main>
        )}

        {/* Chat conversation view — replaces grid when chatMode is active */}
        {chatMode && page === 'home' && (
          <div
            ref={scrollRef}
            style={{
              maxWidth: 1280, margin: '0 auto', padding: '0 32px 32px',
              maxHeight: 'calc(100vh - 380px)', overflowY: 'auto',
              scrollbarWidth: 'none',
              position: 'relative', zIndex: 2,
              animation: 'fadePage 300ms ease',
            }}
          >
            <style>{`
              @keyframes slideInRight {
                from { opacity: 0; transform: translateX(16px); }
                to   { opacity: 1; transform: translateX(0); }
              }
              @keyframes slideInLeft {
                from { opacity: 0; transform: translateX(-16px); }
                to   { opacity: 1; transform: translateX(0); }
              }
              @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
            `}</style>
            {messages.map((m) => {
              const isUser = m.role === 'user';
              return (
                <div key={m.id} style={{
                  display: 'flex',
                  justifyContent: isUser ? 'flex-end' : 'flex-start',
                  marginBottom: 16,
                  animation: `${isUser ? 'slideInRight' : 'slideInLeft'} 0.28s cubic-bezier(0.16, 1, 0.3, 1) both`,
                }}>
                  <div style={{
                    maxWidth: isUser ? '58%' : '84%',
                    padding: '12px 18px',
                    borderRadius: isUser ? '18px 18px 4px 18px' : '4px 18px 18px 18px',
                    fontSize: 15, lineHeight: 1.75,
                    background: isUser ? 'rgba(255,255,255,0.09)' : 'rgba(255,255,255,0.05)',
                    border: `1px solid ${isUser ? 'rgba(255,255,255,0.14)' : 'rgba(255,255,255,0.08)'}`,
                    color: palette.fg,
                  }}>
                    {m.pending ? <TypingDots accent={palette.muted} /> : m.content}
                  </div>

            })}

        {/* Detail page (full-page replacement) */}
        {page !== 'home' && (
          <DetailPage
            which={page}
            data={data}
            palette={palette}
            fonts={fonts}
            onNavigate={setPage}
            scrollRef={detailScrollRef}
          />
        )}

        {/* Chat bar — always fixed at bottom on home */}
        {page === 'home' && (
          <ChatBar
            chatMode={chatMode}
            sending={sending}
            input={input}
            setInput={setInput}
            onSubmit={onSubmit}
            starters={data.starters}
            onStarter={(s) => { setChatMode(true); send(s); }}
            palette={palette}
            fonts={fonts}
            botName="PravGPT"

        <style>{`
          @keyframes orbPulse {
            0%, 100% { transform: scale(1); box-shadow: 0 0 20px ${palette.accent}80; }
            50% { transform: scale(1.15); box-shadow: 0 0 30px ${palette.accent}cc; }
          }

      delay: Math.random() * 4,
      bright: Math.random() > 0.92,
    })), []);
    return (
      <div style={{ position: 'absolute', inset: 0, pointerEvents: 'none' }}>
        {stars.map((s, i) => (
          <div key={i} style={{
            position: 'absolute', left: `${s.x}%`, top: `${s.y}%`,
            width: s.size, height: s.size, borderRadius: '50%',
            background: s.bright ? accent : '#fff',
            opacity: 0.4, animation: `twinkle ${3 + s.delay}s ease-in-out ${s.delay}s infinite`,
          }} />
        ))}
      </div>
    );
  };

      borderRadius: 14, padding: 24, position: 'relative', overflow: 'hidden',

      transition: 'transform 220ms ease, border-color 220ms ease',
      transform: active ? 'translateY(-2px)' : 'none',

      let t2, t3;

      const cycle = () => {
        // Phase 1: slide top bubble up and fade it out
        const topId = itemsRef.current[0]?.id ?? null;
        setRemovingId(topId);

        // Phase 2: after slide-out, shift the queue and add new bubble at bottom
        t2 = setTimeout(() => {
          setRemovingId(null);
          const rest = itemsRef.current.slice(1);
          const nb = makeBubble();

          t3 = setTimeout(() => setEnteringId(null), 40);
        }, ANIM);
      };

  const PendantOrb = ({ accent, muted, theme, onToggle }) => {
    const ANCHOR_X = 'calc(100% - 88px)';
    const CHAIN_LEN = 84;
    const BEAD_COUNT = 18;

    const [angle, setAngle] = React.useState(0);
    const angleRef = React.useRef(0);
    const velRef = React.useRef(0);
    const targetRef = React.useRef(0);
    const rafRef = React.useRef(0);
    const anchorRef = React.useRef({ x: 0, y: 0 });
    const wrapperRef = React.useRef(null);

    React.useEffect(() => {
      const updateAnchor = () => {
        if (wrapperRef.current) {
          const r = wrapperRef.current.getBoundingClientRect();
          anchorRef.current = { x: r.left + r.width / 2, y: r.top };
        }
      };
      updateAnchor();
      window.addEventListener('resize', updateAnchor);
      window.addEventListener('scroll', updateAnchor, true);
      return () => {
        window.removeEventListener('resize', updateAnchor);
        window.removeEventListener('scroll', updateAnchor, true);
      };
    }, []);

    React.useEffect(() => {
      const onMove = (e) => {
        const { x: ax, y: ay } = anchorRef.current;
        const dx = e.clientX - ax;
        const dy = e.clientY - (ay + CHAIN_LEN);
        const dist = Math.hypot(dx, dy);
        const influence = Math.max(0, 1 - dist / 260);
        const targetAngle = Math.atan2(dx, Math.max(40, dy + 60)) * 0.6 * influence;
        targetRef.current = Math.max(-0.7, Math.min(0.7, targetAngle));
      };
      window.addEventListener('mousemove', onMove);
      return () => window.removeEventListener('mousemove', onMove);
    }, []);

    React.useEffect(() => {
      const STIFFNESS = 0.06;
      const DAMPING = 0.86;
      const tick = () => {
        const a = angleRef.current;
        const v = velRef.current;
        const t = targetRef.current;
        const force = (t - a) * STIFFNESS;
        const newV = (v + force) * DAMPING;
        const newA = a + newV;
        angleRef.current = newA;
        velRef.current = newV;
        if (Math.abs(newV) > 0.0002 || Math.abs(t - newA) > 0.0005) {
          setAngle(newA);
        } else {
          angleRef.current = t;
          setAngle(t);
        }
        rafRef.current = requestAnimationFrame(tick);
      };
      rafRef.current = requestAnimationFrame(tick);
      return () => cancelAnimationFrame(rafRef.current);
    }, []);

    const beads = [];
    for (let i = 0; i < BEAD_COUNT; i++) {
      const t = (i + 1) / BEAD_COUNT;
      const beadAngle = angle * Math.pow(t, 0.7);
      const distance = t * CHAIN_LEN;
      const x = Math.sin(beadAngle) * distance;
      const y = Math.cos(beadAngle) * distance;
      beads.push({ x, y });
    }
    const orbT = 1.0;
    const orbAngle = angle * Math.pow(orbT, 0.7);
    const orbX = Math.sin(orbAngle) * (CHAIN_LEN + 12);
    const orbY = Math.cos(orbAngle) * (CHAIN_LEN + 12);

    return (
      <div ref={wrapperRef} style={{
        position: 'absolute', top: 0, left: ANCHOR_X,
        width: 1, height: CHAIN_LEN + 40, zIndex: 5, pointerEvents: 'none',
      }}>
        <div style={{
          position: 'absolute', top: 0, left: 0, width: 6, height: 6,
          borderRadius: '50%', background: muted, opacity: 0.6,
          transform: 'translate(-50%, -50%)',
        }} />
        {beads.map((b, i) => (
          <div key={i} style={{
            position: 'absolute', left: b.x, top: b.y,
            width: 4, height: 4, borderRadius: '50%',
            background: muted, opacity: 0.55,
            transform: 'translate(-50%, -50%)',
          }} />
        ))}
        <button
          onClick={onToggle}
          aria-label={`Switch to ${theme === 'light' ? 'dark' : 'light'} mode`}
          title={`Switch to ${theme === 'light' ? 'dark' : 'light'} mode`}
          style={{
            position: 'absolute', left: orbX, top: orbY,
            width: 36, height: 48,
            background: 'transparent', border: 'none', cursor: 'pointer',
            transform: 'translate(-50%, -38%)',
            pointerEvents: 'auto', padding: 0,
            transition: 'filter 400ms ease',
            filter: theme === 'light'
              ? 'drop-shadow(0 0 18px rgba(255,210,90,0.95)) drop-shadow(0 0 36px rgba(255,180,40,0.55))'
              : 'drop-shadow(0 0 4px rgba(0,0,0,0.4))',
          }}
          onMouseEnter={(e) => { e.currentTarget.style.transform = 'translate(-50%, -38%) scale(1.08)'; }}
          onMouseLeave={(e) => { e.currentTarget.style.transform = 'translate(-50%, -38%) scale(1)'; }}
        >
          <svg viewBox="0 0 36 48" width="36" height="48" style={{ display: 'block', overflow: 'visible' }}>
            <defs>
              <radialGradient id="bulbGlow" cx="50%" cy="55%" r="55%">
                <stop offset="0%" stopColor={theme === 'light' ? '#fff5c2' : '#3a3a3a'} />
                <stop offset="55%" stopColor={theme === 'light' ? '#ffd34d' : '#2a2a2a'} />
                <stop offset="100%" stopColor={theme === 'light' ? '#f5a623' : '#1a1a1a'} />
              </radialGradient>
            </defs>
            <rect x="13" y="2" width="10" height="3" rx="1" fill={muted} opacity="0.85" />
            <rect x="12" y="5" width="12" height="2" fill={muted} opacity="0.7" />
            <rect x="12" y="8" width="12" height="2" fill={muted} opacity="0.7" />
            <rect x="13" y="11" width="10" height="3" rx="1" fill={muted} opacity="0.85" />
            <path
              d="M 11 14 Q 11 18 14 22 Q 18 28 18 34 Q 18 38 14 38 L 22 38 Q 18 38 18 34 Q 18 28 22 22 Q 25 18 25 14 Z"
              fill="url(#bulbGlow)"
              stroke={theme === 'light' ? '#ffe680' : '#444'}
              strokeWidth="0.5"
            />
            <path
              d="M 14 24 Q 15 22 16 24 Q 17 26 18 24 Q 19 22 20 24 Q 21 26 22 24"
              fill="none"
              stroke={theme === 'light' ? '#fff8d0' : '#666'}
              strokeWidth="0.8"
              opacity={theme === 'light' ? 1 : 0.7}
            />
            {theme === 'light' && (
              <ellipse cx="14" cy="20" rx="2" ry="3.5" fill="#fffbe6" opacity="0.65" />
            )}
          </svg>
        </button>
      </div>
    );
  };

  window.VarA = VarA;
  </script>

  <!-- ─── App Entry Point ───────────────────────────────────────── -->

</body>
