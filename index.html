  <!-- ─── PravGPT Chat Logic ─────────────────────────────────── -->
  <script type="text/babel" data-presets="react">
  const PRAVGPT_SYSTEM_PROMPT = `You are PravGPT, an AI assistant embedded on Praveen Sentha's personal portfolio website. Your job is to answer visitors' questions about Praveen, his work, his projects, and his background.

Tone: casual but polite, informative, concise. Speak in first person ABOUT Praveen (i.e. "Praveen built…" or "He works at Qualcomm…"), never as Praveen. Use plain prose — no markdown headings, no bullet lists unless the visitor explicitly asks for a list. Keep replies under 4 short sentences unless asked for detail.

If asked something not covered by the data below, say you don't have that info and suggest reaching out via the contact card. Don't make things up.

=== DATA ABOUT PRAVEEN ===
${JSON.stringify(window.PORTFOLIO_DATA, null, 2)}
`;

  // Replace REPLACE_WITH_YOUR_WORKER_URL with your deployed Cloudflare Worker URL
  // e.g. 'https://pravgpt.yourname.workers.dev/chat'
  const PRAVGPT_ENDPOINT = 'https://pravgpt.pravgpt.workers.dev/chat';

  const MAX_INPUT_CHARS = 1000;
  const MAX_HISTORY_TURNS = 10; // keep last 10 user+assistant pairs

  window.usePravGPT = function usePravGPT() {
    const [messages, setMessages] = React.useState([]);
    const [sending, setSending] = React.useState(false);
    const nextId = React.useRef(0);

    const send = React.useCallback(async (userText) => {
      if (!userText || sending) return;
      const trimmed = userText.trim();
      if (!trimmed) return;
      if (trimmed.length > MAX_INPUT_CHARS) return;

      const uid = nextId.current++;
      const userMsg = { id: `u${uid}`, role: 'user', content: trimmed };
      const placeholder = { id: `a${uid}`, role: 'assistant', content: '', pending: true };
      setMessages((m) => [...m, userMsg, placeholder]);
      setSending(true);

      const controller = new AbortController();
      const timeout = setTimeout(() => controller.abort(), 30000);

      try {
        // Build history: last N turns only, strip UI-only fields (id, pending)
        const history = [...messages, userMsg]
          .slice(-(MAX_HISTORY_TURNS * 2))
          .map(({ role, content }) => ({ role, content }));

        const res = await fetch(PRAVGPT_ENDPOINT, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          signal: controller.signal,
          body: JSON.stringify({
            messages: [
              { role: 'system', content: PRAVGPT_SYSTEM_PROMPT },
              ...history,
            ],
          }),
        });

        const data = await res.json();

        let reply;
        if (res.ok && data.reply) {
          reply = data.reply;
        } else if (data.error === 'rate_limited') {
          reply = "You've sent a lot of messages — give it a minute and try again.";
        } else {
          reply = "Hmm, something went wrong on my end. Try again, or reach Praveen directly at praveen.sentha@gmail.com.";
        }

        setMessages((m) => {
          const copy = [...m];
          const last = copy[copy.length - 1];
          copy[copy.length - 1] = { ...last, content: reply, pending: false };
          return copy;
        });
      } catch (err) {
        const isTimeout = err.name === 'AbortError';
        setMessages((m) => {
          const copy = [...m];
          const last = copy[copy.length - 1];
          copy[copy.length - 1] = {
            ...last,
            pending: false,
            content: isTimeout
              ? "That took too long — try a shorter question, or email Praveen at praveen.sentha@gmail.com."
              : "Couldn't reach the model. Try again in a sec, or email praveen.sentha@gmail.com.",
          };
          return copy;
        });
      } finally {
        clearTimeout(timeout);
        setSending(false);
      }
    }, [messages, sending]);

    const reset = React.useCallback(() => setMessages([]), []);

    return { messages, sending, send, reset };
  };
  </script>

        const h = (window.location.hash || '').replace('#/', '').replace('#', '');

    }, [page]);

      setChatMode(true);
      send(input);
      setInput('');

        warm: { bg: '#0e0d0c', surface: '#1a1816', border: '#2a2622', accent: '#f4d8a8', muted: '#8a8278', fg: '#f6f3ee', soft: '#e8e4dd', softer: '#d4cfc6' },

    const ROW_H = 30;
    const ANIM = 380;
    const nextId = React.useRef(0);

    const makeBubble = () => {
      const id = nextId.current++;
      return { id, side: id % 2 === 0 ? 'blue' : 'green' };
    };

    const [items, setItems] = React.useState(() => [makeBubble(), makeBubble(), makeBubble(), makeBubble()]);
    const [removingId, setRemovingId] = React.useState(null);
    const [enteringId, setEnteringId] = React.useState(null);
    const itemsRef = React.useRef(items);
    itemsRef.current = items;

    React.useEffect(() => {
      let t2, t3;

      const cycle = () => {
        // Phase 1: slide top bubble up and fade it out
        const topId = itemsRef.current[0]?.id ?? null;
        setRemovingId(topId);

        // Phase 2: after slide-out, shift the queue and add new bubble at bottom
        t2 = setTimeout(() => {
          setRemovingId(null);
          const rest = itemsRef.current.slice(1);
          const nb = makeBubble();
          setEnteringId(nb.id);
          setItems([...rest, nb]);
          // Phase 3: fade new bubble in
          t3 = setTimeout(() => setEnteringId(null), 40);
        }, ANIM);
      };

      // 1 second pause + ANIM slide + ANIM slide-up/enter = full cycle
      const interval = setInterval(cycle, 1000 + ANIM * 2 + 60);
      const first = setTimeout(cycle, 1000);
      return () => { clearTimeout(first); clearTimeout(t2); clearTimeout(t3); clearInterval(interval); };
    }, []);

    return (
      <div style={{
        position: 'absolute', top: 24, right: 24,
        width: 150, height: 4 * ROW_H,
        overflow: 'hidden',
      }}>
        {items.map((b, i) => {
          const isBlue = b.side === 'blue';
          const isLeaving = b.id === removingId;
          const isEntering = b.id === enteringId;
          return (
            <div key={b.id} style={{
              position: 'absolute',
              top: isLeaving ? -ROW_H : i * ROW_H,
              left: 0, right: 0, height: ROW_H,
              opacity: isLeaving || isEntering ? 0 : 1,
              transition: `top ${ANIM}ms cubic-bezier(0.4,0,0.2,1), opacity ${Math.round(ANIM * 0.75)}ms ease`,
              display: 'flex',
              justifyContent: isBlue ? 'flex-start' : 'flex-end',
              alignItems: 'center',
            }}>
              <div style={{
                width: 62, height: 22,
                borderRadius: isBlue ? '10px 10px 10px 3px' : '10px 10px 3px 10px',

  };

  const ProjectsDetail = ({ data, palette, fonts }) => {
    const [selected, setSelected] = React.useState(null);
    if (selected !== null) {
      return (
        <ProjectDetailView
          project={data.projects[selected]}

    return (

        <div style={{ display: 'flex', flexDirection: 'column', gap: 26 }}>
          {data.projects.map((p, i) => {
            const meta = PROJ_META[i] || PROJ_META[0];

              <button key={i} onClick={() => setSelected(i)} style={{

                <div>
                  <div style={{ fontSize: 26, fontWeight: 700, fontFamily: fonts.display, marginBottom: 9 }}>{p.name}</div>

  };

  const ContactIconEmail = () => (<svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" strokeWidth="1.7"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m2 7 10 7 10-7"/></svg>);
  const ContactIconLinkedIn = () => (<svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" strokeWidth="1.7"><rect x="2" y="2" width="20" height="20" rx="4"/><path d="M7 10v7M7 7v.01M12 10v7m0-4a3 3 0 0 1 6 0v4"/></svg>);
  const ContactIconGitHub = () => (<svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" strokeWidth="1.7"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/></svg>);
  const ContactIconGlobe = () => (<svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" strokeWidth="1.7"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>);
  const ContactIconPhone = () => (<svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" strokeWidth="1.7"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.6 1.27h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.91a16 16 0 0 0 6.08 6.08l.91-.91a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>);

  const ContactCard = ({ icon, label, value, href, palette }) => {
    const [hov, setHov] = React.useState(false);
    return (
      <a href={href} target={href && !href.startsWith('mailto') && !href.startsWith('tel') ? '_blank' : undefined}
        rel="noreferrer"
        onMouseEnter={() => setHov(true)}
        onMouseLeave={() => setHov(false)}
        style={{
          display: 'flex', alignItems: 'center', gap: 16, padding: '20px 22px',
          background: hov ? `${palette.accent}10` : palette.surface,
          border: `1px solid ${hov ? palette.accent : palette.border}`,
          borderRadius: 14, textDecoration: 'none', color: 'inherit',
          transition: 'background 200ms, border-color 200ms, transform 200ms',
          transform: hov ? 'translateY(-2px)' : 'none',
          cursor: href ? 'pointer' : 'default',
        }}>
        <div style={{
          width: 44, height: 44, borderRadius: 12, flexShrink: 0,
          background: `${palette.accent}18`, color: palette.accent,
          display: 'flex', alignItems: 'center', justifyContent: 'center',
        }}>{icon}</div>
        <div style={{ minWidth: 0 }}>
          <div style={{ fontSize: 11, color: palette.muted, letterSpacing: '0.1em', textTransform: 'uppercase', marginBottom: 3 }}>{label}</div>
          <div style={{ fontSize: 14, color: palette.fg, fontWeight: 500, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{value}</div>
        </div>
        {href && <div style={{ marginLeft: 'auto', color: palette.muted, fontSize: 16, flexShrink: 0 }}>↗</div>}
      </a>

  };

  const ContactDetail = ({ data, palette, fonts }) => (
    <div style={{ WebkitFontSmoothing: 'antialiased', marginTop: 40 }}>
      <div style={{ marginBottom: 36 }}>
        <h2 style={{ fontFamily: fonts.display, fontSize: 36, fontWeight: 600, margin: '0 0 10px', letterSpacing: '-0.01em', color: palette.fg }}>
          Let's connect.
        </h2>
        <p style={{ fontSize: 15, color: palette.muted, lineHeight: 1.6, margin: 0 }}>
          Best reached by email — I typically respond within a day or two.
        </p>
      </div>

      {/* Featured email */}
      <a href={`mailto:${data.contact.email}`}
        style={{
          display: 'flex', alignItems: 'center', gap: 20, padding: '24px 28px',
          background: `linear-gradient(135deg, ${palette.accent}18, ${palette.accent}08)`,
          border: `1px solid ${palette.accent}50`,
          borderRadius: 18, textDecoration: 'none', color: 'inherit', marginBottom: 16,
          transition: 'opacity 200ms',
        }}
        onMouseEnter={(e) => e.currentTarget.style.opacity = '0.85'}
        onMouseLeave={(e) => e.currentTarget.style.opacity = '1'}
      >
        <div style={{
          width: 52, height: 52, borderRadius: 14, flexShrink: 0,
          background: palette.accent, color: palette.bg,
          display: 'flex', alignItems: 'center', justifyContent: 'center',
        }}><ContactIconEmail /></div>
        <div>
          <div style={{ fontSize: 11, color: palette.accent, letterSpacing: '0.1em', textTransform: 'uppercase', marginBottom: 4, fontWeight: 600 }}>Email</div>
          <div style={{ fontSize: 17, color: palette.fg, fontWeight: 600 }}>{data.contact.email}</div>
        </div>
        <div style={{ marginLeft: 'auto', color: palette.accent, fontSize: 20 }}>↗</div>
      </a>

      {/* Grid of other links */}
      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12 }}>
        <ContactCard icon={<ContactIconLinkedIn />} label="LinkedIn" value={data.contact.linkedin} href={`https://${data.contact.linkedin}`} palette={palette} />
        <ContactCard icon={<ContactIconGitHub />} label="GitHub" value={data.contact.github} href={`https://${data.contact.github}`} palette={palette} />
        <ContactCard icon={<ContactIconGlobe />} label="Website" value={data.contact.website} href={`https://${data.contact.website}`} palette={palette} />
        <ContactCard icon={<ContactIconPhone />} label="Phone" value={data.contact.phone} href={`tel:${data.contact.phone}`} palette={palette} />
      </div>
    </div>
  );

  /* ── Chat Bar ── */

  const ChatBar = ({ chatMode, sending, input, setInput, onSubmit, starters, onStarter, palette, botName }) => (
    <div style={{
      position: 'fixed', left: 0, right: 0, bottom: 0, zIndex: 50,
      padding: '48px 80px 32px', pointerEvents: 'none',
      background: `linear-gradient(to top, ${palette.bg} 60%, transparent 100%)`,
    }}>
      <div style={{ maxWidth: 1280, margin: '0 auto', padding: '0 32px', pointerEvents: 'auto' }}>

        {/* Label + pills — only on home before any conversation */}
        {!chatMode && (
          <>
            <div style={{
              textAlign: 'center', marginBottom: 18,
              fontSize: 20, fontWeight: 600, letterSpacing: '0.04em',
              color: palette.accent,
            }}>
              Ask {botName}
            </div>
            <div style={{ display: 'flex', gap: 8, justifyContent: 'center', marginBottom: 16, flexWrap: 'wrap' }}>
              {starters.map((s, i) => (
                <button key={i} onClick={() => onStarter(s)} style={{
                  fontSize: 13, padding: '7px 16px', borderRadius: 999,
                  background: 'transparent', border: `1px solid ${palette.theme === 'dark' ? 'rgba(255,255,255,0.18)' : palette.border}`,
                  color: palette.muted, cursor: 'pointer',
                  transition: 'border-color 150ms, color 150ms', fontFamily: 'inherit',
                }}
                onMouseEnter={(e) => { e.currentTarget.style.borderColor = palette.accent; e.currentTarget.style.color = palette.accent; }}
                onMouseLeave={(e) => { e.currentTarget.style.borderColor = palette.theme === 'dark' ? 'rgba(255,255,255,0.18)' : palette.border; e.currentTarget.style.color = palette.muted; }}
                >{s}</button>
              ))}
            </div>
          </>
        )}

        {/* Standalone input box */}
        <form onSubmit={onSubmit} style={{ position: 'relative' }}>
          <div style={{
            background: palette.theme === 'dark' ? 'rgba(255,255,255,0.06)' : palette.surface,
            border: `1px solid ${palette.theme === 'dark' ? 'rgba(255,255,255,0.11)' : palette.border}`,
            borderRadius: 16,
            padding: '16px 64px 40px 24px',
            minHeight: 120,
            boxShadow: '0 8px 40px rgba(0,0,0,0.5)',
          }}>
            <input
              value={input}
              onChange={(e) => setInput(e.target.value)}
              placeholder={chatMode ? 'Continue the conversation…' : 'What would you like to know?'}
              disabled={sending}
              style={{
                width: '100%', background: 'transparent', border: 'none', outline: 'none',
                color: palette.fg, fontSize: 15, fontFamily: 'inherit',
                display: 'block', lineHeight: 1.5,
              }}
            />
          </div>
          <button type="submit" disabled={!input.trim() || sending} style={{
            position: 'absolute', bottom: 14, right: 14,
            width: 36, height: 36, borderRadius: 10,
            background: input.trim() && !sending ? palette.accent : (palette.theme === 'dark' ? 'rgba(255,255,255,0.1)' : palette.border),
            color: input.trim() && !sending ? palette.bg : palette.muted,
            border: 'none', cursor: input.trim() && !sending ? 'pointer' : 'default',
            display: 'flex', alignItems: 'center', justifyContent: 'center',
            transition: 'background 150ms, color 150ms',
          }}>
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" strokeWidth="2"><path d="m3 11 18-8-8 18-2-8-8-2z"/></svg>
          </button>
        </form>

      </div>
    </div>
  );

  const TypingDots = ({ accent }) => (
    <span style={{ display: 'inline-flex', gap: 4, alignItems: 'center', padding: '4px 0' }}>
      {[0, 1, 2].map(i => (
        <span key={i} style={{
          width: 6, height: 6, borderRadius: '50%', background: accent,
          animation: `dot 1.4s ease-in-out ${i * 0.16}s infinite`,
        }} />
      ))}
      <style>{`@keyframes dot { 0%, 80%, 100% { opacity: 0.3; transform: translateY(0); } 40% { opacity: 1; transform: translateY(-3px); } }`}</style>
    </span>
  );

  /* ── PendantOrb: physics-based light bulb that dangles and toggles theme ── */

  const PendantOrb = ({ accent, muted, theme, onToggle }) => {
    const ANCHOR_X = 'calc(100% - 88px)';
    const CHAIN_LEN = 84;
    const BEAD_COUNT = 18;

    const [angle, setAngle] = React.useState(0);
    const angleRef = React.useRef(0);
    const velRef = React.useRef(0);
    const targetRef = React.useRef(0);
    const rafRef = React.useRef(0);
    const anchorRef = React.useRef({ x: 0, y: 0 });
    const wrapperRef = React.useRef(null);

    React.useEffect(() => {
      const updateAnchor = () => {
        if (wrapperRef.current) {
          const r = wrapperRef.current.getBoundingClientRect();
          anchorRef.current = { x: r.left + r.width / 2, y: r.top };
        }
      };
      updateAnchor();
      window.addEventListener('resize', updateAnchor);
      window.addEventListener('scroll', updateAnchor, true);
      return () => {
        window.removeEventListener('resize', updateAnchor);
        window.removeEventListener('scroll', updateAnchor, true);
      };
    }, []);

    React.useEffect(() => {
      const onMove = (e) => {
        const { x: ax, y: ay } = anchorRef.current;
        const dx = e.clientX - ax;
        const dy = e.clientY - (ay + CHAIN_LEN);
        const dist = Math.hypot(dx, dy);
        const influence = Math.max(0, 1 - dist / 260);
        const targetAngle = Math.atan2(dx, Math.max(40, dy + 60)) * 0.6 * influence;
        targetRef.current = Math.max(-0.7, Math.min(0.7, targetAngle));
      };
      window.addEventListener('mousemove', onMove);
      return () => window.removeEventListener('mousemove', onMove);
    }, []);

    React.useEffect(() => {
      const STIFFNESS = 0.06;
      const DAMPING = 0.86;
      const tick = () => {
        const a = angleRef.current;
        const v = velRef.current;
        const t = targetRef.current;
        const force = (t - a) * STIFFNESS;
        const newV = (v + force) * DAMPING;
        const newA = a + newV;
        angleRef.current = newA;
        velRef.current = newV;
        if (Math.abs(newV) > 0.0002 || Math.abs(t - newA) > 0.0005) {
          setAngle(newA);
        } else {
          angleRef.current = t;
          setAngle(t);
        }
        rafRef.current = requestAnimationFrame(tick);
      };
      rafRef.current = requestAnimationFrame(tick);
      return () => cancelAnimationFrame(rafRef.current);
    }, []);

    const beads = [];
    for (let i = 0; i < BEAD_COUNT; i++) {
      const t = (i + 1) / BEAD_COUNT;
      const beadAngle = angle * Math.pow(t, 0.7);
      const distance = t * CHAIN_LEN;
      const x = Math.sin(beadAngle) * distance;
      const y = Math.cos(beadAngle) * distance;
      beads.push({ x, y });
    }
    const orbT = 1.0;
    const orbAngle = angle * Math.pow(orbT, 0.7);
    const orbX = Math.sin(orbAngle) * (CHAIN_LEN + 12);
    const orbY = Math.cos(orbAngle) * (CHAIN_LEN + 12);

    return (
      <div ref={wrapperRef} style={{
        position: 'fixed', top: 0, left: ANCHOR_X,
        width: 1, height: CHAIN_LEN + 40, zIndex: 150, pointerEvents: 'none',
      }}>
        <div style={{
          position: 'absolute', top: 0, left: 0, width: 6, height: 6,
          borderRadius: '50%', background: muted, opacity: 0.6,
          transform: 'translate(-50%, -50%)',
        }} />
        {beads.map((b, i) => (
          <div key={i} style={{
            position: 'absolute', left: b.x, top: b.y,
            width: 4, height: 4, borderRadius: '50%',
            background: muted, opacity: 0.55,
            transform: 'translate(-50%, -50%)',
          }} />
        ))}
        <button
          onClick={onToggle}
          aria-label={`Switch to ${theme === 'light' ? 'dark' : 'light'} mode`}
          title={`Switch to ${theme === 'light' ? 'dark' : 'light'} mode`}
          style={{
            position: 'absolute', left: orbX, top: orbY,
            width: 36, height: 48,
            background: 'transparent', border: 'none', cursor: 'pointer',
            transform: 'translate(-50%, -38%)',
            pointerEvents: 'auto', padding: 0,
            transition: 'filter 400ms ease',
            filter: theme === 'light'
              ? 'drop-shadow(0 0 18px rgba(255,210,90,0.95)) drop-shadow(0 0 36px rgba(255,180,40,0.55))'
              : 'drop-shadow(0 0 4px rgba(0,0,0,0.4))',
          }}
          onMouseEnter={(e) => { e.currentTarget.style.transform = 'translate(-50%, -38%) scale(1.08)'; }}
          onMouseLeave={(e) => { e.currentTarget.style.transform = 'translate(-50%, -38%) scale(1)'; }}
        >
          <svg viewBox="0 0 36 48" width="36" height="48" style={{ display: 'block', overflow: 'visible' }}>
            <defs>
              <radialGradient id="bulbGlow" cx="50%" cy="55%" r="55%">
                <stop offset="0%" stopColor={theme === 'light' ? '#fff5c2' : '#3a3a3a'} />
                <stop offset="55%" stopColor={theme === 'light' ? '#ffd34d' : '#2a2a2a'} />
                <stop offset="100%" stopColor={theme === 'light' ? '#f5a623' : '#1a1a1a'} />
              </radialGradient>
            </defs>
            <rect x="13" y="2" width="10" height="3" rx="1" fill={muted} opacity="0.85" />
            <rect x="12" y="5" width="12" height="2" fill={muted} opacity="0.7" />
            <rect x="12" y="8" width="12" height="2" fill={muted} opacity="0.7" />
            <rect x="13" y="11" width="10" height="3" rx="1" fill={muted} opacity="0.85" />
            <path
              d="M 11 14 Q 11 18 14 22 Q 18 28 18 34 Q 18 38 14 38 L 22 38 Q 18 38 18 34 Q 18 28 22 22 Q 25 18 25 14 Z"
              fill="url(#bulbGlow)"
              stroke={theme === 'light' ? '#ffe680' : '#444'}
              strokeWidth="0.5"
            />
            <path
              d="M 14 24 Q 15 22 16 24 Q 17 26 18 24 Q 19 22 20 24 Q 21 26 22 24"
              fill="none"
              stroke={theme === 'light' ? '#fff8d0' : '#666'}
              strokeWidth="0.8"
              opacity={theme === 'light' ? 1 : 0.7}
            />
            {theme === 'light' && (
              <ellipse cx="14" cy="20" rx="2" ry="3.5" fill="#fffbe6" opacity="0.65" />
            )}
          </svg>
        </button>
      </div>
    );
  };

  window.VarA = VarA;
  </script>

  <!-- ─── App Entry Point ───────────────────────────────────────── -->
  <script type="text/babel" data-presets="react">
  const DEFAULT_TWEAKS = {
    palette: 'cool',
    fonts: 'classic',
    bg: 'stars',
    cardStyle: 'bordered',
    density: 'normal',

  const App = window.VarA;
